name: ragent

services:
  # ============================================
  # Nginx - 前端托管 + API 反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: ragent-nginx
    ports:
      - "80:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./resources/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # Spring Boot 后端
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragent-backend
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - BAILIAN_API_KEY=${BAILIAN_API_KEY:-}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-123456}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rocketmq-broker:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/api/ragent/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ============================================
  # PostgreSQL + pgvector
  # ============================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ragent-postgres
    environment:
      POSTGRES_DB: ragent
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ragent-pg-data:/var/lib/postgresql/data
      - ./resources/database/schema_pg.sql:/docker-entrypoint-initdb.d/01-schema_pg.sql:ro
      - ./resources/database/init_data_pg.sql:/docker-entrypoint-initdb.d/02-init_data_pg.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ragent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: ragent-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    ports:
      - "6379:6379"
    volumes:
      - ragent-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ============================================
  # RocketMQ NameServer
  # ============================================
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: ragent-rocketmq-namesrv
    command: sh mqnamesrv
    ports:
      - "39876:9876"
    volumes:
      - ragent-rocketmq-namesrv-data:/home/rocketmq/store
    environment:
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
    restart: unless-stopped

  # ============================================
  # RocketMQ Broker
  # ============================================
  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: ragent-rocketmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "30911:10911"
      - "30909:10909"
      - "38081:8081"
    environment:
      - NAMESRV_ADDR=rocketmq-namesrv:9876
      - JAVA_OPT_EXT=-Xms256m -Xmx256m
      - BROKER_IP1=rocketmq-broker
    # Temporarily remove volume to isolate storage-related NPE
    # volumes:
    #   - ragent-rocketmq-broker-data:/home/rocketmq/store
    depends_on:
      - rocketmq-namesrv
    restart: unless-stopped

  # ============================================
  # MinIO (S3 兼容对象存储, 替代 RustFS)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: ragent-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ragent-minio-data:/data
    restart: unless-stopped

volumes:
  ragent-pg-data:
  ragent-redis-data:
  ragent-rocketmq-namesrv-data:
  ragent-rocketmq-broker-data:
  ragent-minio-data:
